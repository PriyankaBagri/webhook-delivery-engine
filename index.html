<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engine Dashboard</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --success-bg: rgba(16, 185, 129, 0.15);
            --failed: #ef4444;
            --failed-bg: rgba(239, 68, 68, 0.15);
            --border: #334155;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); 
            color: var(--text);
            margin: 0; 
            padding: 40px; 
        }

        .container { max-width: 1100px; margin: 0 auto; }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        h1 { margin: 0; font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
        
        .live-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-muted);
            background: var(--card-bg);
            padding: 6px 16px;
            border-radius: 50px;
            border: 1px solid var(--border);
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            animation: pulsing 2s infinite;
        }

        @keyframes pulsing {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        /* Metrics Grid */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .metric-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 12px;
        }

        .metric-label { font-size: 14px; color: var(--text-muted); margin-bottom: 8px; font-weight: 500; }
        .metric-value { font-size: 32px; font-weight: 700; }

        /* Table Design */
        .table-container {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #151f32; color: var(--text-muted); font-weight: 600; padding: 16px; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        td { padding: 18px 16px; border-bottom: 1px solid var(--border); font-size: 14px; }
        tr:last-child td { border-bottom: none; }
        
        .badge { padding: 6px 12px; border-radius: 6px; font-weight: 600; font-size: 12px; display: inline-block; }
        .badge-success { background: var(--success-bg); color: var(--success); }
        .badge-failed { background: var(--failed-bg); color: var(--failed); }
        .url-text { font-family: monospace; color: #cbd5e1; background: #0f172a; padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📡 Webhook Engine Control</h1>
        <div class="live-indicator">
            <div class="pulse"></div> Live Monitoring Active
        </div>
    </div>

    <div class="metrics-grid">
        <div class="metric-card">
            <div class="metric-label">Total Logs</div>
            <div class="metric-value" id="count-total">-</div>
        </div>
        <div class="metric-card" style="border-left: 4px solid var(--success)">
            <div class="metric-label">Delivered</div>
            <div class="metric-value" style="color: var(--success)" id="count-success">-</div>
        </div>
        <div class="metric-card" style="border-left: 4px solid var(--failed)">
            <div class="metric-label">Failed</div>
            <div class="metric-value" style="color: var(--failed)" id="count-failed">-</div>
        </div>
    </div>
    
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Target Endpoint URL</th>
                    <th>Status</th>
                    <th>Attempts</th>
                    <th>Timestamp</th>
                </tr>
            </thead>
            <tbody id="log-rows">
                </tbody>
        </table>
    </div>
</div>

<script>
    async function loadLogs() {
        try {
            // We use a relative path so the browser doesn't block it!
           const response = await fetch('http://localhost:3000/api/logs');
            const logs = await response.json();
            
            const tableBody = document.getElementById('log-rows');
            tableBody.innerHTML = ''; 

            let successCount = 0;
            let failedCount = 0;

            logs.forEach(log => {
                if(log.status === 'SUCCEEDED') successCount++;
                else failedCount++;

                const badgeClass = log.status === 'SUCCEEDED' ? 'badge-success' : 'badge-failed';
                
                const row = `
                    <tr>
                        <td><span style="color: var(--text-muted)">#</span>${log.id}</td>
                        <td><span class="url-text">${log.url}</span></td>
                        <td><span class="badge ${badgeClass}">${log.status}</span></td>
                        <td>${log.attempts} / 3</td>
                        <td>${new Date(log.timestamp).toLocaleString()}</td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });

            // Update Metrics Cards dynamically
            document.getElementById('count-total').innerText = logs.length;
            document.getElementById('count-success').innerText = successCount;
            document.getElementById('count-failed').innerText = failedCount;

        } catch (error) {
            console.error("Dashboard error:", error);
        }
    }

    // Run instantly on load
    loadLogs();
    
    // AUTO REFRESH: Fetch new data every 3 seconds completely on its own!
    setInterval(loadLogs, 3000);
</script>
</body>
</html>
