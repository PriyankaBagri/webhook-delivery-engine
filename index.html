<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webhook Delivery Engine - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
        }
    </style>
</head>
<body class="p-8">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8 border-b border-slate-700 pb-4">
            <div>
                <h1 class="text-3xl font-bold text-emerald-400">⚡ Webhook Engine</h1>
                <p class="text-slate-400 text-sm mt-1">Real-time Delivery Monitoring Logs</p>
            </div>
            <div class="flex items-center gap-2">
                <span class="relative flex h-3 w-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                </span>
                <span class="text-xs text-slate-400 font-mono">Live Sync Active</span>
            </div>
        </div>

        <div class="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden shadow-2xl">
            <div class="p-5 border-b border-slate-800 bg-slate-900/50 flex justify-between items-center">
                <h2 class="font-semibold text-slate-200">Webhook Logs History</h2>
                <button onclick="loadLogs()" class="px-3 py-1.5 text-xs bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg transition border border-slate-700 cursor-pointer">
                    🔄 Force Refresh
                </button>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-950/40 text-slate-400 text-xs font-mono uppercase tracking-wider border-b border-slate-800">
                            <th class="p-4">ID</th>
                            <th class="p-4">Event</th>
                            <th class="p-4">URL Endpoint</th>
                            <th class="p-4">Status</th>
                            <th class="p-4">Response</th>
                            <th class="p-4">Timestamp</th>
                        </tr>
                    </thead>
                    <tbody id="logs-table-body" class="divide-y divide-slate-800/60 text-sm">
                        <tr id="no-data-row">
                            <td colspan="6" class="p-8 text-center text-slate-500 font-mono text-xs">
                                No logs available. Waiting for incoming webhooks...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Function to update HTML Table with database data
        function updateDashboard(logs) {
            const tbody = document.getElementById('logs-table-body');
            
            if (!logs || logs.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" class="p-8 text-center text-slate-500 font-mono text-xs">
                            No logs available. Waiting for incoming webhooks...
                        </td>
                    </tr>`;
                return;
            }

            let rowsHtml = '';
            logs.forEach(log => {
            // Agar status_code hai toh use dikhao, nahi toh jo string status ('FAILED'/'SUCCESS') hai wohi dikhao
            const displayStatus = log.status_code || log.status || 'UNKNOWN';
            
            // Status color logic: Agar status 200-299 hai ya string 'SUCCESS' hai toh green, nahi toh red
            const isSuccess = (log.status_code >= 200 && log.status_code < 300) || String(log.status).toUpperCase() === 'SUCCESS';
            
            const badgeClass = isSuccess 
                ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' 
                : 'bg-rose-500/10 text-rose-400 border-rose-500/20';

            rowsHtml += `
                <tr class="hover:bg-slate-800/30 transition font-mono text-xs text-slate-300">
                    <td class="p-4 text-slate-500">#${log.id}</td>
                    <td class="p-4 font-semibold text-slate-200">${log.event || log.event_type || 'Webhook'}</td>
                    <td class="p-4 text-slate-400 truncate max-w-xs" title="${log.url}">${log.url || 'N/A'}</td>
                    <td class="p-4">
                        <span class="px-2.5 py-1 rounded-md text-xs font-semibold border ${badgeClass}">
                            ${displayStatus}
                        </span>
                    </td>
                    <td class="p-4 text-slate-400 truncate max-w-xs">${log.response_body || log.response || '{}'}</td>
                    <td class="p-4 text-slate-500">${new Date(log.timestamp).toLocaleString() || 'Just now'}</td>
                </tr>
            `;
        });

            tbody.innerHTML = rowsHtml;
        }

        // Asynchronous Engine to fetch data from Backend
        async function loadLogs() {
            try {
                // Direct call to node backend API
                const response = await fetch('http://localhost:3000/api/logs');

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                console.log("Data successfully fetched:", data);
                
                // Update table interface
                updateDashboard(data);

            } catch (error) {
                console.error("Dashboard Engine Connection Error:", error);
            }
        }

        // Event listener to start the engine when page loads
        window.addEventListener('DOMContentLoaded', () => {
            // First instant load
            loadLogs();
            
            // Auto sync data every 3 seconds
            setInterval(loadLogs, 3000);
        });
    </script>
</body>
</html>
